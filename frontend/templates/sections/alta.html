<section class="alta">
  <div class="container">

    <div class="alta-header">
      <h2>Em Alta</h2>
    </div>

    <div class="alta-grid">
      {% for noticia in noticias[:4] %}
      
      {% if noticia.categoria == 'Campanhas' %}
      <a href="{{ url_for('noticia_detalhe', id=noticia.id) }}"
         class="alta-card"
         target="_blank">

        <div class="alta-image-wrapper">

          {% if noticia.imagem %}
            <img
              src="{{ noticia.imagem }}"
              alt="{{ noticia.titulo }}"
              class="alta-image"
            >
          {% else %}
            <div class="alta-image-placeholder">
              <i class="fas fa-newspaper"></i>
            </div>
          {% endif %}

          <span class="alta-dot"></span>
        </div>

        <div class="alta-content">

          <span class="alta-categoria">
            {{ noticia.categoria }}
          </span>

          <h3 class="alta-titulo">
            {{ noticia.titulo }}
          </h3>

          <div class="alta-meta">
            <i class="fas fa-calendar-alt"></i>
            <span>{{ noticia.data }}</span>
          </div>

        </div>

      </a>
      {% endif %}
      {% endfor %}

    </div>
  </div>
</section>
